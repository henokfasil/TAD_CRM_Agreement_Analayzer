services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: crm_agreements
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm_agreements"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    env_file: .env.example
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  streamlit:
    build: .
    env_file: .env.example
    command: streamlit run streamlit_app/Home.py --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api

