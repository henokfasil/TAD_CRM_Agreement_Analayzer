version: v1
title: CRM agreement codebook v1
variables:
  - code: enforceability_levels
    family: legal_institutional_design
    label: Enforceability level
    description: Classifies the agreement's enforceability from non-binding political cooperation to binding legal obligation with enforceable mechanisms.
    data_type: ordinal
    allowed_values: [0, 1, 2, 3, 4]
    risk_level: high
    mandatory_human_review: true
  - code: DSM_type
    family: legal_institutional_design
    label: Dispute settlement mechanism type
    description: Identifies whether the agreement contains no, consultative, diplomatic, arbitral, judicial, or other dispute settlement mechanism.
    data_type: categorical
    allowed_values: [none, consultation, diplomatic, arbitration, judicial, other]
    risk_level: high
    mandatory_human_review: true
  - code: DSM_seq
    family: legal_institutional_design
    label: Dispute settlement sequence
    description: Indicates whether dispute settlement procedures are sequenced through defined procedural stages.
    data_type: binary
    allowed_values: [0, 1]
    risk_level: high
    mandatory_human_review: true
  - code: compliance_measures
    family: legal_institutional_design
    label: Compliance measures
    description: Indicates whether the agreement contains compliance, follow-up, reporting, or corrective measures.
    data_type: binary
    allowed_values: [0, 1]
    risk_level: high
    mandatory_human_review: true
  - code: compliance_seq
    family: legal_institutional_design
    label: Compliance sequence
    description: Indicates whether compliance measures follow a defined sequence or escalation logic.
    data_type: binary
    allowed_values: [0, 1]
    risk_level: high
    mandatory_human_review: true

