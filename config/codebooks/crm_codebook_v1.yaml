  - code: inv_gen_ref
    family: investment
    label: General investment reference
    description: Indicates any general reference to investment, financing, or capital mobilisation.
    data_type: binary
    allowed_values: [0, 1]
  - code: inv_crm
    family: investment
    label: CRM-specific investment reference
    description: Indicates investment language linked to critical raw materials, minerals, value chains, or related projects.
    data_type: binary
    allowed_values: [0, 1]
    dependencies: {requires: {inv_gen_ref: 1}}
  - code: inv_basic_def
    family: investment
    label: Basic CRM investment definition
    description: Indicates CRM investment language with at least minimal operational detail beyond a general reference.
    data_type: binary
    allowed_values: [0, 1]
    dependencies: {requires: {inv_gen_ref: 1, inv_crm: 1}}
  - code: inv_spec_def
    family: investment
    label: Extensively defined CRM investment provision
    description: Indicates CRM-related investment defined in substantial, operational, or instrument-specific detail.
    data_type: binary
    allowed_values: [0, 1]
    risk_level: medium
    mandatory_human_review: true
    dependencies: {requires: {inv_gen_ref: 1, inv_crm: 1, inv_basic_def: 1}}
    positive_criteria:
      - names a financing mechanism
      - names an institution
      - identifies a specific programme
      - specifies a quantified amount
      - identifies concrete project-selection or implementation procedures
    negative_criteria:
      - general promotion of investment
      - aspirational reference without mechanism
      - generic reference to private-sector participation
      - no CRM linkage
    positive_examples:
      - text: Participants intend to mobilise grants, guarantees, loans, or equity.
        explanation: Specific financing instruments are listed.
    negative_examples:
      - text: The parties will encourage investment in critical minerals.
        explanation: General intent without operational detail.
